<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos Ocultos da Hotmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff003c;
            --dark-bg: #030305;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden; /* Previne rolagem indesejada nos efeitos visuais */
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Efeito de Grade Futurista no Fundo */
        .cyber-grid {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: moveGrid 15s linear infinite;
            z-index: -1;
            opacity: 0.6;
        }

        @keyframes moveGrid {
            0% { background-position: 0 0; }
            100% { background-position: 0 30px; }
        }

        /* Fontes e Textos */
        h1 {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.7), 0 0 20px rgba(0, 240, 255, 0.4);
            letter-spacing: 1px;
        }

        .glitch-effect {
            animation: glitch 3s infinite alternate;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--neon-cyan), -2px 0 var(--neon-magenta); }
            5% { text-shadow: -2px 0 var(--neon-cyan), 2px 0 var(--neon-magenta); }
            10% { text-shadow: 2px 0 var(--neon-cyan), -2px 0 var(--neon-magenta); }
            15% { text-shadow: none; }
            100% { text-shadow: none; }
        }

        /* Input Customizado */
        .cyber-input {
            width: 100%;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.5);
            color: var(--neon-cyan);
            font-family: 'Share Tech Mono', monospace;
            padding: 1rem;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .cyber-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5), inset 0 0 15px rgba(0, 240, 255, 0.2);
            background: rgba(0, 240, 255, 0.1);
        }

        .cyber-input::placeholder {
            color: rgba(0, 240, 255, 0.4);
        }

        /* Botões Futuristas */
        .cyber-btn {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #0055ff, var(--neon-cyan));
            color: white;
            border: none;
            border-radius: 50px;
            padding: 1rem 2rem;
            width: 100%;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            transition: all 0.3s ease;
            z-index: 1;
        }

        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: all 0.5s ease;
            z-index: -1;
        }

        .cyber-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 30px var(--neon-cyan);
        }

        .cyber-btn.magenta-theme {
            background: linear-gradient(90deg, #8800ff, var(--neon-magenta));
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.4);
        }

        .cyber-btn.magenta-theme:active {
            box-shadow: 0 0 30px var(--neon-magenta);
        }

        /* Terminal Area */
        .terminal-container {
            font-family: 'Share Tech Mono', monospace;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.1), 0 0 15px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        .terminal-container::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .status-box {
            border: 1px solid var(--neon-magenta);
            background: rgba(255, 0, 60, 0.1);
            color: var(--neon-magenta);
            text-align: center;
            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 1.25rem;
            text-shadow: 0 0 10px var(--neon-magenta);
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.3);
            animation: pulseWarning 2s infinite;
            position: relative;
            overflow: hidden;
        }

        .status-box::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 2px;
            background: var(--neon-magenta);
            animation: scanline 2s linear infinite;
        }

        @keyframes scanline {
            0% { top: 0; left: -100%; }
            50% { left: 100%; }
            100% { top: 100%; left: 100%; }
        }

        @keyframes pulseWarning {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 0, 60, 0.3); }
            50% { box-shadow: 0 0 30px rgba(255, 0, 60, 0.6); }
        }

        /* Canvas Background */
        #particleCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
        }
        
        .hidden-el {
            display: none !important;
        }

        /* Notificação de Erro Customizada */
        #error-msg {
            color: var(--neon-magenta);
            font-size: 0.875rem;
            margin-top: 0.5rem;
            text-shadow: 0 0 5px var(--neon-magenta);
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* Estilização extra para input de arquivo */
        input[type="file"]::file-selector-button {
            font-family: 'Orbitron', sans-serif;
            background: rgba(0, 240, 255, 0.1);
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 1rem;
        }
        input[type="file"]::file-selector-button:hover {
            background: var(--neon-cyan);
            color: var(--dark-bg);
        }
    </style>
</head>
<body>

    <!-- Fundo Animado -->
    <canvas id="particleCanvas"></canvas>
    <div class="cyber-grid"></div>

    <!-- Container Principal (Otimizado para Mobile) -->
    <main class="relative z-10 w-11/12 max-w-md mx-auto flex flex-col items-center">
        
        <!-- Fase 1: Entrada de Dados -->
        <div id="step-1" class="w-full flex flex-col items-center space-y-8 transition-opacity duration-500">
            
            <h1 class="text-3xl md:text-4xl text-center font-black glitch-effect">
                Desbloqueie seu<br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">Produto Oculto</span>
            </h1>

            <div class="w-full relative">
                <input 
                    type="url" 
                    id="urlInput" 
                    class="cyber-input text-center text-sm md:text-base" 
                    placeholder="Cole a URL do produto aqui..."
                    autocomplete="off"
                >
                <div id="error-msg" class="text-center font-bold">⚠️ Insira uma URL válida para continuar.</div>
            </div>

            <button id="btn-unlock" class="cyber-btn mt-4">
                Desbloquear Agora
            </button>
            
        </div>

        <!-- Fase 2: Terminal de Desbloqueio (Oculto Inicialmente) -->
        <div id="step-2" class="w-full hidden-el flex-col items-stretch space-y-6">
            
            <div class="terminal-container min-h-[250px] flex flex-col justify-start">
                <div id="terminal-text" class="text-cyan-400 text-sm md:text-base mb-4"></div>
                
                <!-- Caixa de Status (Aparece dinamicamente) -->
                <div id="status-container" class="hidden-el">
                    <div class="status-box">
                        STATUS: PRODUTO OCULTO
                    </div>
                </div>
            </div>

            <button id="btn-access" class="cyber-btn magenta-theme hidden-el transition-all duration-500 opacity-0 translate-y-4">
                Acessar Produto
            </button>

        </div>

        <!-- Fase 3: Pagamento e Comprovante (Oculto Inicialmente) -->
        <div id="step-3" class="w-full hidden-el flex-col items-center space-y-6">
            
            <h2 class="text-2xl text-center font-bold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-cyan-500 font-['Orbitron'] glitch-effect">
                ACESSO LIBERADO
            </h2>
            <p class="text-center text-sm text-gray-300">Realize o pagamento para finalizar o desbloqueio definitivo.</p>

            <!-- QR Code -->
            <div class="p-2 border-2 border-cyan-400 rounded-xl shadow-[0_0_20px_rgba(0,240,255,0.4)] bg-white/5 backdrop-blur-sm">
                <img src="https://produtosocultosdahotmart.grupobhds.com/qr-code.png" alt="QR Code Pix" class="w-48 h-48 md:w-56 md:h-56 object-cover rounded-lg">
            </div>

            <!-- Botão Copia e Cola -->
            <button id="btn-copy-pix" class="cyber-btn text-sm py-2">
                📋 Copiar Pix Copia e Cola
            </button>
            <div id="copy-feedback" class="text-green-400 text-sm font-bold opacity-0 transition-opacity">Pix Copiado com sucesso!</div>

            <!-- Formulário de Envio -->
            <div class="w-full space-y-4 mt-4 bg-black/50 p-4 border border-cyan-900 rounded-lg">
                <label class="text-xs text-cyan-400 uppercase tracking-wider font-bold">1. Seu WhatsApp</label>
                <input 
                    type="tel" 
                    id="whatsappInput" 
                    class="cyber-input text-center text-sm" 
                    placeholder="Ex: 43999999999"
                >

                <label class="text-xs text-cyan-400 uppercase tracking-wider font-bold block mt-4">2. Anexar Comprovante</label>
                <div class="flex flex-col md:flex-row gap-3 items-center w-full">
                    <input 
                        type="file" 
                        id="proofInput" 
                        accept="image/*,.pdf" 
                        class="cyber-input w-full text-xs p-2"
                    >
                    <button id="btn-send-proof" class="cyber-btn magenta-theme w-full md:w-auto text-sm py-3 px-6 whitespace-nowrap">
                        Enviar
                    </button>
                </div>
                <div id="form-error-msg" class="text-center text-red-500 font-bold text-sm opacity-0 transition-opacity">⚠️ Preencha o WhatsApp e anexe o comprovante!</div>
            </div>

        </div>

    </main>

    <script>
        // --- CONFIGURAÇÃO: Coloque aqui a URL do seu backend no Render ---
        const BACKEND_URL = "https://produtosocultosdahotmart.onrender.com/enviar-comprovante";

        // --- 1. Efeitos de Partículas no Fundo (Canvas) ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = `rgba(0, 240, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < (window.innerWidth < 768 ? 50 : 100); i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // --- 2. Lógica de UI e Interação ---
        const step1 = document.getElementById('step-1');
        const step2 = document.getElementById('step-2');
        const step3 = document.getElementById('step-3');
        const inputUrl = document.getElementById('urlInput');
        const btnUnlock = document.getElementById('btn-unlock');
        const btnAccess = document.getElementById('btn-access');
        const terminalText = document.getElementById('terminal-text');
        const statusContainer = document.getElementById('status-container');
        const errorMsg = document.getElementById('error-msg');

        // Elementos da Fase 3
        const btnCopyPix = document.getElementById('btn-copy-pix');
        const copyFeedback = document.getElementById('copy-feedback');
        const whatsappInput = document.getElementById('whatsappInput');
        const proofInput = document.getElementById('proofInput');
        const btnSendProof = document.getElementById('btn-send-proof');
        const formErrorMsg = document.getElementById('form-error-msg');

        // Função de utilidade para pausas assíncronas
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        // Efeito de digitação no terminal
        async function typeTerminal(text, speed = 40) {
            terminalText.innerHTML += '<br><span class="opacity-70">></span> ';
            let currentLine = document.createElement('span');
            terminalText.appendChild(currentLine);
            
            for (let i = 0; i < text.length; i++) {
                currentLine.innerHTML += text.charAt(i);
                await sleep(speed);
            }
        }

        // Função principal do Botão 1 (Desbloquear)
        btnUnlock.addEventListener('click', async () => {
            const urlValue = inputUrl.value.trim().toLowerCase();
            
            // Validação de URL exigida (Hotmart)
            const isValidUrl = urlValue.startsWith('https://pay.hotmart.com/') || 
                               urlValue.startsWith('http://pay.hotmart.com/') || 
                               urlValue.startsWith('https://payment.hotmart.com/');

            if (!urlValue || !isValidUrl) {
                errorMsg.innerText = "⚠️ Insira uma URL válida da Hotmart (pay.hotmart.com...)";
                errorMsg.style.opacity = '1';
                inputUrl.style.borderColor = 'var(--neon-magenta)';
                setTimeout(() => {
                    errorMsg.style.opacity = '0';
                    inputUrl.style.borderColor = '';
                }, 4000);
                return;
            }

            // Transição visual
            step1.style.opacity = '0';
            await sleep(500);
            step1.classList.add('hidden-el');
            step2.classList.remove('hidden-el');

            // Sequência de animação do terminal
            await typeTerminal("Iniciando conexão segura...", 30);
            await sleep(800);
            
            await typeTerminal("Analisando chaves de acesso da URL...", 30);
            await sleep(1000);
            
            await typeTerminal("Identificando o status do produto...", 50);
            await sleep(1200);

            // Revela Status Oculto
            statusContainer.classList.remove('hidden-el');
            await sleep(1500);

            await typeTerminal("Bypass de segurança concluído.", 30);
            await sleep(600);
            await typeTerminal("Desbloqueio autorizado. Acesso liberado.", 40);
            
            // Revela Botão Final
            await sleep(500);
            btnAccess.classList.remove('hidden-el');
            // Pequeno delay para a animação de fade-in e slide-up do Tailwind funcionar
            setTimeout(() => {
                btnAccess.classList.remove('opacity-0', 'translate-y-4');
                btnAccess.classList.add('opacity-100', 'translate-y-0');
            }, 50);
        });

        // Função principal do Botão 2 (Acessar Produto) - Agora leva para a Etapa 3
        btnAccess.addEventListener('click', async () => {
            // Feedback visual
            btnAccess.innerText = "LIBERANDO ACESSO...";
            btnAccess.style.opacity = "0.7";

            await sleep(800);

            // Transição para Etapa 3 (Pagamento)
            step2.style.display = 'none';
            step3.classList.remove('hidden-el');
        });

        // --- Lógica do Pix Copia e Cola ---
        const pixString = "00020101021126770014br.gov.bcb.pix0122chavepix@grupobhds.com0229Consulta de Produtos  Hotmart52040000530398654041.005802BR5918BRUNO H DOS SANTOS6008LONDRINA62070503***63043858";
        
        btnCopyPix.addEventListener('click', () => {
            // Tenta usar a API moderna de Clipboard
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(pixString).then(() => showCopyFeedback());
            } else {
                // Fallback para navegadores antigos/mobile
                const textArea = document.createElement("textarea");
                textArea.value = pixString;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showCopyFeedback();
                } catch (err) {
                    console.error('Falha ao copiar', err);
                }
                textArea.remove();
            }
        });

        function showCopyFeedback() {
            copyFeedback.style.opacity = '1';
            setTimeout(() => { copyFeedback.style.opacity = '0'; }, 3000);
        }

        // --- Lógica de Envio de Comprovante ---
        btnSendProof.addEventListener('click', async () => {
            const wppValue = whatsappInput.value.trim();
            const fileValue = proofInput.files[0];
            const originalUrl = inputUrl.value.trim();

            // Validação de campos vazios
            if (!wppValue || !fileValue) {
                formErrorMsg.style.opacity = '1';
                setTimeout(() => { formErrorMsg.style.opacity = '0'; }, 3000);
                return;
            }

            // UI de carregamento
            const originalBtnText = btnSendProof.innerText;
            btnSendProof.innerText = "ENVIANDO...";
            btnSendProof.disabled = true;
            btnSendProof.style.opacity = "0.5";

            // Preparando dados para enviar ao backend (Render)
            const formData = new FormData();
            formData.append('whatsapp', wppValue);
            formData.append('url', originalUrl);
            formData.append('comprovante', fileValue);

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    btnSendProof.innerText = "✅ ENVIADO COM SUCESSO!";
                    btnSendProof.classList.remove('magenta-theme');
                    btnSendProof.style.background = "linear-gradient(90deg, #00b09b, #96c93d)";
                } else {
                    throw new Error("Falha na resposta do servidor");
                }
            } catch (error) {
                console.error("Erro ao enviar:", error);
                btnSendProof.innerText = "❌ ERRO! TENTE NOVAMENTE";
                setTimeout(() => {
                    btnSendProof.innerText = originalBtnText;
                    btnSendProof.disabled = false;
                    btnSendProof.style.opacity = "1";
                }, 3000);
            }
        });

    </script>
</body>
</html>
