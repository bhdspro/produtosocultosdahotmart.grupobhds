<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Produto Oculto da Hotmart</title>
    <!-- Adicionado Favicon 🔥 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Biblioteca para gerar QR Code Dinâmico -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff003c;
            --dark-bg: #030305;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
            height: 100dvh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ocultar Barra de Rolagem */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }

        /* Efeito de Grade Futurista no Fundo */
        .cyber-grid {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: moveGrid 15s linear infinite;
            z-index: -1;
            opacity: 0.6;
        }

        @keyframes moveGrid {
            0% { background-position: 0 0; }
            100% { background-position: 0 30px; }
        }

        h1, h2, h3 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .glitch-effect {
            animation: glitch 3s infinite alternate;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--neon-cyan), -2px 0 var(--neon-magenta); }
            5% { text-shadow: -2px 0 var(--neon-cyan), 2px 0 var(--neon-magenta); }
            10% { text-shadow: 2px 0 var(--neon-cyan), -2px 0 var(--neon-magenta); }
            15% { text-shadow: none; }
            100% { text-shadow: none; }
        }

        /* Botões Futuristas */
        .cyber-btn {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #0055ff, var(--neon-cyan));
            color: white;
            border: none;
            border-radius: 50px;
            padding: 1rem 2rem;
            width: 100%;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            transition: all 0.3s ease;
            z-index: 1;
        }

        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: all 0.5s ease;
            z-index: -1;
        }

        .cyber-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 30px var(--neon-cyan);
        }

        .cyber-btn.magenta-theme {
            background: linear-gradient(90deg, #8800ff, var(--neon-magenta));
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.4);
        }

        .cyber-btn.magenta-theme:active {
            box-shadow: 0 0 30px var(--neon-magenta);
        }

        /* Canvas Background */
        #particleCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
        }
        
        /* Estilização futurista do QR Code gerado */
        #qrcode img, #qrcode canvas {
            margin: 0 auto;
            border-radius: 8px;
            padding: 10px;
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3), inset 0 0 15px rgba(0, 240, 255, 0.2);
        }
    </style>
</head>
<body>

    <!-- Fundo Animado -->
    <canvas id="particleCanvas"></canvas>
    <div class="cyber-grid"></div>

    <!-- Container Principal (Otimizado para Mobile, sem scrollbar visível) -->
    <main class="relative z-10 w-11/12 max-w-md mx-auto flex flex-col items-center max-h-[100dvh] overflow-y-auto no-scrollbar py-4">
        
        <!-- Fase Única: Meta e Acesso -->
        <div class="w-full flex flex-col items-center space-y-5 pb-2 my-auto">
            
            <div class="flex flex-col items-center space-y-1">
                <h2 class="text-xl md:text-2xl text-center font-bold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-cyan-500 font-['Orbitron'] glitch-effect">
                    ACESSO LIBERADO
                </h2>
                <p class="text-center text-xs md:text-sm text-gray-300 leading-tight px-2">Realize uma contribuição para ajudar na meta e desbloquear a lista!</p>
            </div>

            <!-- QR Code Dinâmico Futurista -->
            <div class="p-2 rounded-xl relative w-full flex justify-center">
                <div id="qrcode"></div>
                <!-- Linha de escaneamento sobre o QR Code -->
                <div class="absolute inset-0 mx-auto w-48 bg-gradient-to-b from-transparent via-cyan-400/40 to-transparent h-1 animate-[scanline_2s_linear_infinite] pointer-events-none rounded-lg"></div>
            </div>

            <!-- Botão Copia e Cola Centralizado -->
            <div class="w-full flex flex-col items-center relative z-10 pt-1">
                <button id="btn-copy-pix" class="cyber-btn text-xs py-2 w-full max-w-[280px]">
                    Clique para Copiar Pix Copia e Cola
                </button>
                <div id="copy-feedback" class="text-green-400 text-[10px] md:text-xs font-bold opacity-0 transition-opacity absolute -bottom-5 w-full text-center pointer-events-none">Pix Copiado com sucesso!</div>
            </div>

            <!-- Barra de Progresso da Meta -->
            <div class="w-full flex flex-col items-center pt-3 max-w-[280px] mx-auto">
                <div class="w-full flex justify-between text-[10px] md:text-xs font-bold text-cyan-400 font-['Share_Tech_Mono'] mb-1">
                    <span id="meta-text-atual">R$ 0,00</span>
                    <span id="meta-text-final">Meta: R$ 0,00</span>
                </div>
                <!-- Track da Barra -->
                <div class="w-full h-3 md:h-4 bg-black/60 rounded-full overflow-hidden border border-cyan-900 shadow-[inset_0_0_5px_rgba(0,0,0,0.8)] relative">
                    <!-- Preenchimento Dinâmico -->
                    <div id="progress-fill" class="h-full bg-gradient-to-r from-[#0055ff] to-cyan-400 w-0 transition-all duration-1000 ease-out relative">
                        <!-- Brilho na ponta -->
                        <div class="absolute right-0 top-0 bottom-0 w-2 bg-white opacity-50 blur-[2px]"></div>
                    </div>
                </div>
                <div id="progress-percentage" class="text-[10px] text-cyan-500 font-bold mt-1 tracking-wider">0% Concluído</div>
            </div>

            <!-- Divisória Futurista Simples -->
            <div class="w-full max-w-[280px] h-[1px] bg-gradient-to-r from-transparent via-cyan-900 to-transparent my-3"></div>

            <!-- Seção de Acesso -->
            <div class="w-full flex flex-col items-center space-y-4">
                <h3 class="text-sm md:text-base text-center font-bold text-cyan-100 uppercase tracking-widest drop-shadow-[0_0_8px_rgba(0,240,255,0.8)]">
                    Lista com <span class="text-cyan-400 text-lg md:text-xl font-black">29</span> Produtos Ocultos
                </h3>

                <button id="btn-access-products" class="cyber-btn magenta-theme text-xs py-3 w-full max-w-[280px]">
                    Acessar Produto
                </button>
                <div id="access-error-msg" class="text-center text-red-500 font-bold text-[10px] md:text-xs opacity-0 transition-opacity mt-1 pointer-events-none">
                    ⚠️ Ajude com a Meta para Desbloquear a Lista de Produtos Ocultos
                </div>
            </div>

        </div>

    </main>

    <script>
        // =========================================================
        // CONFIGURAÇÕES DA META - ALTERE OS VALORES AQUI
        // =========================================================
        const meta_atual = 5; // <- Valor que já foi arrecadado
        const meta_final = 150; // <- Valor total da meta
        // =========================================================

        // --- 1. Efeitos de Partículas no Fundo (Canvas) ---
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = `rgba(0, 240, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < (window.innerWidth < 768 ? 50 : 100); i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // --- 2. Lógica de UI e Interação ---
        
        // Elementos
        const btnCopyPix = document.getElementById('btn-copy-pix');
        const copyFeedback = document.getElementById('copy-feedback');
        const btnAccessProducts = document.getElementById('btn-access-products');
        const accessErrorMsg = document.getElementById('access-error-msg');
        
        // Elementos da Barra de Meta
        const progressFill = document.getElementById('progress-fill');
        const metaTextAtual = document.getElementById('meta-text-atual');
        const metaTextFinal = document.getElementById('meta-text-final');
        const progressPercentage = document.getElementById('progress-percentage');

        // Estado do usuário
        let usuarioAjudouMeta = false;

        // String PIX solicitada
        const pixString = "00020101021126770014br.gov.bcb.pix0122chavepix@grupobhds.com0229Meta da Lista de Produtos HTM5204000053039865802BR5918BRUNO H DOS SANTOS6008LONDRINA62070503***63049F30";

        // Inicialização Dinâmica do Sistema
        window.addEventListener('DOMContentLoaded', () => {
            // 1. Gera o QR Code dinâmico
            const qrcodeContainer = document.getElementById("qrcode");
            if (qrcodeContainer.innerHTML.trim() === "") {
                new QRCode(qrcodeContainer, {
                    text: pixString,
                    width: 180, // Tamanho grande
                    height: 180, // Tamanho grande
                    colorDark : "#00f0ff", // Ciano Neon
                    colorLight : "#000000", // Preto profundo
                    correctLevel : QRCode.CorrectLevel.L
                });
            }

            // 2. Calcula e renderiza a Barra de Progresso
            const calcPercentage = Math.min((meta_atual / meta_final) * 100, 100);
            
            // Função para formatar para R$ BR
            const formatCurrency = (val) => 'R$ ' + val.toFixed(2).replace('.', ',');

            metaTextAtual.innerText = formatCurrency(meta_atual);
            metaTextFinal.innerText = 'Meta: ' + formatCurrency(meta_final);
            progressPercentage.innerText = Math.floor(calcPercentage) + '% Concluído';

            // Timeout para dar o efeito de carregamento visual da barra
            setTimeout(() => {
                progressFill.style.width = calcPercentage + '%';
            }, 400);
        });

        // --- Lógica do Pix Copia e Cola ---
        btnCopyPix.addEventListener('click', () => {
            
            // Libera o botão de Acesso
            usuarioAjudouMeta = true; 

            // Forçamos o uso do método fallback (execCommand)
            const textArea = document.createElement("textarea");
            textArea.value = pixString;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                
                // Feedback visual de Cópia
                copyFeedback.style.opacity = '1';
                setTimeout(() => { copyFeedback.style.opacity = '0'; }, 3000);
                
                // Muda a cor do botão de acesso para indicar que está liberado
                btnAccessProducts.classList.remove('magenta-theme');
                btnAccessProducts.style.background = "linear-gradient(90deg, #00b09b, #96c93d)";
                btnAccessProducts.style.boxShadow = "0 0 15px rgba(150, 201, 61, 0.4)";
                
            } catch (err) {
                console.error('Falha ao copiar', err);
            }
            textArea.remove();
        });

        // --- Lógica de Acesso ao Produto ---
        btnAccessProducts.addEventListener('click', () => {
            if (!usuarioAjudouMeta) {
                // Usuário não clicou em Copiar Pix
                accessErrorMsg.style.opacity = '1';
                setTimeout(() => { accessErrorMsg.style.opacity = '0'; }, 3000);
            } else {
                // Usuário cumpriu os requisitos -> Redireciona
                btnAccessProducts.innerText = "ABRINDO GRUPO...";
                btnAccessProducts.style.opacity = "0.7";
                
                setTimeout(() => {
                    window.location.href = "https://produtosocultosdahotmart.grupobhds.com/grupo";
                }, 600);
            }
        });

    </script>
</body>
</html>
